services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: climatequest
      MYSQL_USER: climatequest
      MYSQL_PASSWORD: climatequest
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -proot --silent"]
      interval: 3s
      timeout: 3s
      retries: 30

  server:
    build:
      context: ./server
    environment:
      PORT: 8080
      NODE_ENV: production
      FRONTEND_ORIGIN: http://localhost:5174
      MYSQL_URL: mysql://climatequest:climatequest@mysql:3306/climatequest
      SESSION_SECRET: change-me
      COOKIE_SAMESITE: lax
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5174:80"
    depends_on:
      - server

