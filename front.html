<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClimateQuest - Start Your Green Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* 基础重置 */
        :root {
            --primary-accent: #00f2ff; /* 极光青，吸引年轻人的科技感 */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 保持单页全屏无滚动 */
        }

        /* 背景设置与渐变遮罩 */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: 
                linear-gradient(to bottom, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.7) 100%),
                url('./img1.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 顶部导航栏 (毛玻璃效果) */
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center; /* 导航链接居中 */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        /* 导航链接 */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 48px; /* 间距 */
        }

        .nav-links li a,
        .nav-links li button {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            font-weight: 400;
            transition: color 0.3s ease;
            letter-spacing: 0.5px;
        }

        .nav-links li a:hover,
        .nav-links li button:hover {
            color: #ffffff;
        }

        .nav-links li button {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        /* 右上角 Login 按钮 */
        .login-btn {
            position: absolute;
            right: 40px;
            padding: 10px 28px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.6);
            color: #ffffff;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        /* 页面中间内容区 */
        .main-content {
            text-align: center;
            z-index: 5;
            padding: 0 20px;
            max-width: 900px;
            animation: fadeIn 1.2s ease-out forwards;
        }

        /* 主标题 */
        .main-title {
            font-size: 4.5rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -1px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.25rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.6;
            margin-bottom: 48px;
            margin-left: auto;
            margin-right: auto;
            max-width: 750px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* 行动呼唤 (CTA) 按钮 */
        .cta-button {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: 600;
            background: var(--primary-accent);
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
        }

        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.5);
            letter-spacing: 4px;
        }

        /* 登录弹窗 */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .modal {
            width: min(520px, calc(100vw - 32px));
            border-radius: 18px;
            padding: 22px 22px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.45);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .modal-title {
            color: #fff;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.2);
            color: rgba(255,255,255,0.9);
            cursor: pointer;
        }

        .form {
            display: grid;
            gap: 12px;
        }

        .field label {
            display: block;
            color: rgba(255,255,255,0.85);
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 12px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(0,0,0,0.25);
            color: #fff;
            outline: none;
        }

        .form-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 4px;
        }

        .link-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .primary-btn {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            background: var(--primary-accent);
            color: #000;
            font-weight: 700;
            letter-spacing: 0.6px;
        }

        .hint {
            margin-top: 10px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .error {
            margin-top: 10px;
            color: #ffd0d0;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* 简单的进场动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    apiBase: 'https://fit5120-climatequest.onrender.com',
                    navLinks: [
                        { label: 'Home', key: 'home' },
                        { label: 'My Scene', key: 'scene' },
                        { label: 'Tasks', key: 'tasks' },
                        { label: 'Quiz', key: 'quiz' },
                        { label: 'Leaderboard', key: 'leaderboard' },
                    ],
                    titleLines: ['The Climate is Changing', 'So Can You'],
                    subtitle:
                        'Turn Your Daily Choices into a Force of Nature. Restore Glaciers. Regrow Forests. Reclaim the Earth - One Green Action at a Time.',
                    ctaText: 'Start Your Quest',
                    user: null,
                    authOpen: false,
                    authMode: 'login', // 'login' | 'register'
                    form: {
                        email: '',
                        password: '',
                        displayName: '',
                    },
                    busy: false,
                    errorMsg: '',
                };
            },
            computed: {
                loginButtonText() {
                    if (this.user) return this.user.displayName || this.user.email;
                    return 'Login';
                },
            },
            async mounted() {
                await this.refreshMe();
            },
            methods: {
                async api(path, options = {}) {
                    const url = `${this.apiBase}${path}`;
                    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
                    const res = await fetch(url, {
                        ...options,
                        headers,
                        credentials: 'include',
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) {
                        const msg = data?.error || data?.message || `HTTP_${res.status}`;
                        const err = new Error(msg);
                        err.status = res.status;
                        err.data = data;
                        throw err;
                    }
                    return data;
                },
                async refreshMe() {
                    try {
                        const data = await this.api('/api/auth/me', { method: 'GET' });
                        this.user = data.user;
                    } catch (e) {
                        this.user = null;
                    }
                },
                onNavClick(key) {
                    console.log('nav:', key);
                },
                onLogin() {
                    if (this.user) {
                        // 已登录点击昵称：退出
                        this.onLogout();
                        return;
                    }
                    this.openAuth('login');
                },
                onCta() {
                    console.log('cta click');
                },
                openAuth(mode) {
                    this.authMode = mode;
                    this.authOpen = true;
                    this.errorMsg = '';
                    this.form.password = '';
                },
                closeAuth() {
                    this.authOpen = false;
                    this.errorMsg = '';
                },
                toggleAuthMode() {
                    this.openAuth(this.authMode === 'login' ? 'register' : 'login');
                },
                async submitAuth() {
                    if (this.busy) return;
                    this.busy = true;
                    this.errorMsg = '';
                    try {
                        if (this.authMode === 'register') {
                            const payload = {
                                email: this.form.email,
                                password: this.form.password,
                                displayName: this.form.displayName,
                            };
                            const data = await this.api('/api/auth/register', {
                                method: 'POST',
                                body: JSON.stringify(payload),
                            });
                            this.user = data.user;
                        } else {
                            const payload = { email: this.form.email, password: this.form.password };
                            const data = await this.api('/api/auth/login', {
                                method: 'POST',
                                body: JSON.stringify(payload),
                            });
                            this.user = data.user;
                        }
                        this.closeAuth();
                    } catch (e) {
                        this.errorMsg = String(e?.message || '登录失败');
                    } finally {
                        this.busy = false;
                    }
                },
                async onLogout() {
                    try {
                        await this.api('/api/auth/logout', { method: 'POST', body: JSON.stringify({}) });
                    } catch (e) {
                        // ignore
                    } finally {
                        this.user = null;
                    }
                },
            },
            template: `
                <div class="hero-section">
                    <nav class="navbar">
                        <ul class="nav-links">
                            <li v-for="item in navLinks" :key="item.key">
                                <button type="button" @click="onNavClick(item.key)">{{ item.label }}</button>
                            </li>
                        </ul>
                        <button type="button" class="login-btn" @click="onLogin">
                            {{ loginButtonText }}
                        </button>
                    </nav>

                    <div class="main-content">
                        <h1 class="main-title">
                            {{ titleLines[0] }}<br />{{ titleLines[1] }}
                        </h1>
                        <p class="subtitle">{{ subtitle }}</p>
                        <button type="button" class="cta-button" @click="onCta">{{ ctaText }}</button>
                    </div>

                    <div v-if="authOpen" class="modal-backdrop" @click.self="closeAuth">
                        <div class="modal" role="dialog" aria-modal="true">
                            <div class="modal-header">
                                <div class="modal-title">
                                    {{ authMode === 'login' ? '登录' : '注册' }}
                                </div>
                                <button type="button" class="icon-btn" @click="closeAuth">×</button>
                            </div>

                            <div class="form">
                                <div class="field" v-if="authMode === 'register'">
                                    <label>昵称（可选）</label>
                                    <input v-model="form.displayName" placeholder="Display name" autocomplete="nickname" />
                                </div>

                                <div class="field">
                                    <label>邮箱</label>
                                    <input v-model="form.email" placeholder="you@example.com" autocomplete="email" />
                                </div>

                                <div class="field">
                                    <label>密码</label>
                                    <input v-model="form.password" type="password" placeholder="至少 8 位" autocomplete="current-password" />
                                </div>

                                <div class="form-actions">
                                    <button type="button" class="link-btn" @click="toggleAuthMode">
                                        {{ authMode === 'login' ? '没有账号？去注册' : '已有账号？去登录' }}
                                    </button>
                                    <button type="button" class="primary-btn" :disabled="busy" @click="submitAuth">
                                        {{ busy ? '处理中...' : (authMode === 'login' ? '登录' : '注册') }}
                                    </button>
                                </div>

                                <div class="hint" v-if="!errorMsg">
                                    说明：这是 Cookie Session 登录（HttpOnly）。你需要启动后端并配置 `FRONTEND_ORIGIN` 与 `apiBase`。
                                </div>
                                <div class="error" v-else>
                                    {{ errorMsg }}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `,
        }).mount('#app');
    </script>
</body>
</html>
